<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบดูแลนักเรียน - Student Care</title>

  <!-- Tailwind CSS + DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDK (compat สำหรับใช้แบบไม่ต้องใช้ Bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    /* ฟอนต์ไทยน่าอ่านจาก Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;700&display=swap');
    body { font-family: 'IBM Plex Sans Thai', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-base-200">

  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-md">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl font-bold text-primary">🏫 ระบบดูแลนักเรียน</a>
    </div>
    <div class="flex-none gap-2">
      <label class="swap swap-rotate btn btn-ghost btn-circle">
        <input type="checkbox" id="themeToggle" />
        <svg class="swap-on fill-current w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
        <svg class="swap-off fill-current w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
      </label>
    </div>
  </div>

  <!-- เนื้อหาหลัก -->
  <main class="container mx-auto p-6">
    <!-- สถานะการเชื่อมต่อ -->
    <div id="statusBox" class="alert shadow-lg mb-6">
      <span id="statusIcon">⏳</span>
      <span id="statusText">กำลังเชื่อมต่อกับ Firebase...</span>
    </div>

    <!-- ตัวอย่างการ์ดข้อมูล (จะถูกสร้างด้วย JS จริง ๆ ก็ได้) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title text-secondary">👨‍🎓 ข้อมูลนักเรียน</h2>
          <p class="text-2xl font-bold">--</p>
          <p>จำนวนนักเรียนในระบบ</p>
        </div>
      </div>
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title text-accent">📋 เช็คชื่อวันนี้</h2>
          <p class="text-2xl font-bold">--</p>
          <p>จำนวนที่บันทึกแล้ว</p>
        </div>
      </div>
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title text-info">📢 ข้อความล่าสุด</h2>
          <p class="text-sm">รอการเชื่อมต่อ...</p>
        </div>
      </div>
    </div>

    <!-- ส่วนล่าง: แสดงข้อมูลจาก Firestore -->
    <div class="mt-8 overflow-x-auto">
      <table class="table table-zebra w-full" id="dataTable">
        <thead>
          <tr>
            <th>รหัส</th>
            <th>ชื่อ-สกุล</th>
            <th>ห้อง</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="3" class="text-center">🔍 รอข้อมูลจาก Firestore...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    // ---------- ตั้งค่า Firebase ของคุณ ----------
    const firebaseConfig = {
      apiKey: "AIza...YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };

    // เริ่มต้น Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ---------- Theme Toggle ----------
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    themeToggle.addEventListener('change', () => {
      html.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
    });

    // ---------- ฟังก์ชันอัปเดตสถานะ ----------
    function setStatus(icon, text, alertType) {
      document.getElementById('statusIcon').textContent = icon;
      document.getElementById('statusText').textContent = text;
      const box = document.getElementById('statusBox');
      box.className = `alert ${alertType} shadow-lg mb-6`;
    }

    // ---------- โหลดข้อมูลทดสอบ ----------
    async function testFirestore() {
      try {
        // ลองอ่าน collection ชื่อ "students" (ถ้ายังไม่มีก็ไม่เป็นไร)
        const snapshot = await db.collection('students').limit(5).get();
        if (snapshot.empty) {
          setStatus('⚠️', 'เชื่อมต่อ Firestore ได้ แต่ยังไม่มีข้อมูลนักเรียน', 'alert-warning');
          return;
        }

        const tableBody = document.querySelector('#dataTable tbody');
        tableBody.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const row = `<tr>
            <td>${doc.id}</td>
            <td>${data.name || '-'}</td>
            <td>${data.class || '-'}</td>
          </tr>`;
          tableBody.insertAdjacentHTML('beforeend', row);
        });

        // อัปเดตจำนวนนักเรียน
        const totalSnapshot = await db.collection('students').count().get();
        document.querySelector('.card:nth-child(1) .text-2xl').textContent = totalSnapshot.data().count;

        setStatus('✅', `เชื่อมต่อ Firestore สำเร็จ พบ ${totalSnapshot.data().count} นักเรียน`, 'alert-success');
      } catch (error) {
        console.error(error);
        setStatus('❌', `เกิดข้อผิดพลาด: ${error.message}`, 'alert-error');
      }
    }

    // ---------- ทดสอบ Authentication (สมัคร/เข้าสู่ระบบ) ----------
    // (สำหรับตอนนี้เรายังไม่บังคับล็อกอิน แต่แสดงว่าพร้อมใช้งาน)
    auth.onAuthStateChanged(user => {
      if (user) {
        console.log('ผู้ใช้ล็อกอิน:', user.email);
      } else {
        console.log('ไม่มีผู้ใช้ล็อกอิน');
      }
    });

    // เรียกใช้เมื่อหน้าเว็บโหลดเสร็จ
    window.addEventListener('DOMContentLoaded', () => {
      testFirestore();
    });
  </script>
</body>
</html>
